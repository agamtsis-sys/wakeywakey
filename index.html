<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Walkie-Talkie</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #000; color: #0f0; margin: 0; }
        .box { border: 2px solid #0f0; padding: 25px; border-radius: 15px; width: 280px; text-align: center; background: #111; }
        .bar { height: 12px; background: #222; border: 1px solid #444; margin: 10px 0; overflow: hidden; }
        #r-fill { height: 100%; width: 0%; background: #0f0; transition: width 0.1s; }
        #l-fill { height: 100%; width: 0%; background: #007bff; transition: width 0.1s; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; width: 80px; font-size: 1.5rem; text-align: center; margin: 10px; padding: 5px; }
        #ptt { width: 140px; height: 140px; border-radius: 50%; border: 6px solid #444; background: #222; color: #fff; font-size: 1rem; cursor: pointer; outline: none; margin-top: 10px;}
        #ptt:active { border-color: #0f0; box-shadow: 0 0 20px #0f0; }
        #ptt:disabled { opacity: 0.2; }
    </style>
</head>
<body>

    <div class="box">
        <div style="font-size: 1.2rem;">ID: <span id="myid" style="color:#fff">....</span></div>
        
        <div style="font-size: 0.6rem; margin-top:15px; text-align:left;">YOU (TRANSMIT)</div>
        <div class="bar"><div id="l-fill"></div></div>
        
        <div style="font-size: 0.6rem; text-align:left;">THEM (RECEIVE)</div>
        <div class="bar"><div id="r-fill"></div></div>

        <input type="number" id="rid" placeholder="0000">
        <button onclick="connectNow()" style="background:#0f0; border:none; padding:10px; cursor:pointer; font-weight:bold; width:100%;">SYNC CONNECTION</button>
        
        <button id="ptt" disabled>HOLD TO TALK</button>
        <div id="stat" style="font-size: 0.7rem; color: #666; margin-top:15px;">INITIALIZING...</div>
    </div>

    <script>
        const myId = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('myid').innerText = myId;

        // --- PASTE YOUR METERED.CA CREDENTIALS HERE ---
        const peer = new Peer(myId, {
            config: {'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { 
                    urls: 'turn:standard.metered.ca:443', 
                    username: '04bfc0921d83f1fe432e0ba6', 
                    credential: 'yqGPzEgVNB4nv9OI' 
                }
            ]}
        });

        let stream;
        navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
            stream = s;
            stream.getAudioTracks()[0].enabled = false;
            viz(s, 'l-fill');
            document.getElementById('stat').innerText = "MIC READY";
        });

        function connectNow() {
            const call = peer.call(document.getElementById('rid').value, stream);
            setup(call);
        }

        peer.on('call', c => {
            c.answer(stream);
            setup(c);
        });

        function setup(call) {
            document.getElementById('stat').innerText = "TUNNELING...";
            call.on('stream', rs => {
                const a = new Audio();
                a.srcObject = rs;
                a.play().catch(() => document.getElementById('stat').innerText = "TAP TO UNMUTE!");
                viz(rs, 'r-fill');
                document.getElementById('ptt').disabled = false;
                document.getElementById('stat').innerText = "GLOBAL LINK ACTIVE";
            });
        }

        function viz(s, id) {
            const ctx = new AudioContext();
            const src = ctx.createMediaStreamSource(s);
            const ana = ctx.createAnalyser();
            src.connect(ana);
            const d = new Uint8Array(ana.frequencyBinCount);
            function loop() {
                requestAnimationFrame(loop);
                ana.getByteFrequencyData(d);
                let vol = d.reduce((a,b)=>a+b)/d.length;
                document.getElementById(id).style.width = (vol * 3) + "%";
            }
            loop();
        }

        const btn = document.getElementById('ptt');
        btn.onmousedown = () => { if(stream) stream.getAudioTracks()[0].enabled = true; };
        btn.onmouseup = () => { if(stream) stream.getAudioTracks()[0].enabled = false; };
        btn.ontouchstart = (e) => { e.preventDefault(); if(stream) stream.getAudioTracks()[0].enabled = true; };
        btn.ontouchend = (e) => { e.preventDefault(); if(stream) stream.getAudioTracks()[0].enabled = false; };
    </script>
</body>
</html>
