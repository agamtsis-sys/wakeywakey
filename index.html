<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Walkie</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: white; margin: 0; }
        .card { background: #252525; padding: 30px; border-radius: 20px; text-align: center; width: 280px; border: 2px solid #333; }
        #led { width: 20px; height: 20px; background: #500; border-radius: 50%; margin: 0 auto 15px; transition: 0.2s; border: 2px solid #000; }
        .led-on { background: #0f0 !important; box-shadow: 0 0 15px #0f0; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; margin: 10px 0; width: 80%; background: #000; color: #0f0; font-family: monospace; font-size: 1.2rem; text-align: center; }
        #ptt-btn { 
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid #444; 
            background: #222; color: white; font-weight: bold; cursor: pointer;
            user-select: none; margin-top: 20px; outline: none;
        }
        #ptt-btn:active { background: #333; border-color: #0f0; }
        #ptt-btn:disabled { opacity: 0.2; }
        .id-text { color: #007bff; font-size: 2rem; margin: 10px 0; font-family: monospace; }
        #status { color: #888; margin-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="card">
        <div id="led"></div>
        <div style="font-size: 0.7rem; color: #666;">YOUR 4-DIGIT ID</div>
        <div id="my-id" class="id-text">....</div>
        
        <input type="number" id="remote-id" placeholder="Friend's ID">
        <button id="connect-btn" style="width: 100%; padding: 10px; background: #007bff; border: none; color: white; border-radius: 5px;">Connect</button>
        
        <button id="ptt-btn" disabled>HOLD TO TALK</button>
        <div id="status">Initializing...</div>
    </div>

    <script>
        // Generate a simple 4-digit ID
        const simpleId = Math.floor(1000 + Math.random() * 9000).toString();
        const peer = new Peer(simpleId); 
        
        let localStream;
        const pttBtn = document.getElementById('ptt-btn');
        const led = document.getElementById('led');
        const statusDiv = document.getElementById('status');

        document.getElementById('my-id').innerText = simpleId;

        // Get Microphone
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            localStream = stream;
            localStream.getAudioTracks()[0].enabled = false;
            statusDiv.innerText = "Mic Connected";
        }).catch(() => { statusDiv.innerText = "Error: Allow Microphone!"; });

        // Connect Button
        document.getElementById('connect-btn').addEventListener('click', () => {
            const rId = document.getElementById('remote-id').value;
            if (!rId) return;
            const call = peer.call(rId, localStream);
            handleCall(call);
        });

        // Incoming Call
        peer.on('call', call => {
            call.answer(localStream);
            handleCall(call);
        });

        function handleCall(call) {
            statusDiv.innerText = "Connecting...";
            call.on('stream', remoteStream => {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                // Important: Try to play immediately, but show status if blocked
                audio.play().then(() => {
                    statusDiv.innerText = "LIVE";
                }).catch(() => {
                    statusDiv.innerText = "Tap screen to enable audio!";
                    window.addEventListener('click', () => audio.play(), {once: true});
                });
                pttBtn.disabled = false;
            });
        }

        // PTT Functions
        const talk = () => { if(localStream) { localStream.getAudioTracks()[0].enabled = true; led.classList.add('led-on'); statusDiv.innerText = "TRANSMITTING..."; } };
        const silent = () => { if(localStream) { localStream.getAudioTracks()[0].enabled = false; led.classList.remove('led-on'); statusDiv.innerText = "LIVE"; } };

        pttBtn.addEventListener('mousedown', talk);
        pttBtn.addEventListener('mouseup', silent);
        pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); talk(); });
        pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); silent(); });

    </script>
</body>
</html>
