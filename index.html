<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WiFi Walkie</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 280px; }
        #ptt { width: 120px; height: 120px; border-radius: 50%; border: none; background: #444; color: white; font-weight: bold; margin: 20px 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #ptt:active { background: #00ff00; color: black; transform: scale(0.95); }
        .bar { height: 10px; background: #111; margin: 10px 0; border-radius: 5px; overflow: hidden; }
        #l-fill { height: 100%; width: 0%; background: #0088ff; transition: width 0.1s; }
        #r-fill { height: 100%; width: 0%; background: #00ff00; transition: width 0.1s; }
        input { background: #111; border: 1px solid #444; color: white; padding: 10px; width: 80px; text-align: center; font-size: 1.2rem; border-radius: 5px; }
        button.sync { background: #0088ff; border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h3>ID: <span id="myid">...</span></h3>
        
        <div style="font-size: 0.7rem; text-align: left;">YOU</div>
        <div class="bar"><div id="l-fill"></div></div>
        
        <div style="font-size: 0.7rem; text-align: left;">THEM</div>
        <div class="bar"><div id="r-fill"></div></div>

        <input type="number" id="rid" placeholder="0000">
        <button class="sync" onclick="connectNow()">SYNC</button>
        <br>
        <button id="ptt" disabled>HOLD TO TALK</button>
        <div id="status" style="font-size: 0.8rem; margin-top: 10px; color: #888;">Starting...</div>
    </div>

    <script>
        const myId = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('myid').innerText = myId;

        // NO TURN SERVERS NEEDED FOR LOCAL WIFI
        const peer = new Peer(myId);

        let localStream;
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            localStream = stream;
            localStream.getAudioTracks()[0].enabled = false;
            visualize(stream, 'l-fill');
            document.getElementById('status').innerText = "Ready";
        }).catch(() => document.getElementById('status').innerText = "Mic Error!");

        function connectNow() {
            const remoteId = document.getElementById('rid').value;
            const call = peer.call(remoteId, localStream);
            setupCall(call);
        }

        peer.on('call', call => {
            call.answer(localStream);
            setupCall(call);
        });

        function setupCall(call) {
            document.getElementById('status').innerText = "Connected";
            call.on('stream', remoteStream => {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play().catch(() => document.getElementById('status').innerText = "Tap to Unmute");
                visualize(remoteStream, 'r-fill');
                document.getElementById('ptt').disabled = false;
            });
        }

        function visualize(stream, elementId) {
            const ctx = new AudioContext();
            const source = ctx.createMediaStreamSource(stream);
            const analyzer = ctx.createAnalyser();
            source.connect(analyzer);
            const data = new Uint8Array(analyzer.frequencyBinCount);
            function frame() {
                analyzer.getByteFrequencyData(data);
                const vol = data.reduce((a, b) => a + b) / data.length;
                document.getElementById(elementId).style.width = (vol * 3) + "%";
                requestAnimationFrame(frame);
            }
            frame();
        }

        const btn = document.getElementById('ptt');
        const toggle = (on) => { if(localStream) localStream.getAudioTracks()[0].enabled = on; };
        btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); toggle(true); };
        btn.onmouseup = btn.ontouchend = () => toggle(false);
    </script>
</body>
</html>
