<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Walkie</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f0f0f; color: #0f0; margin: 0; }
        .unit { background: #1a1a1a; padding: 25px; border-radius: 40px; border: 5px solid #333; width: 280px; text-align: center; box-shadow: 0 0 30px rgba(0,255,0,0.2); }
        .display { background: #000; padding: 15px; border-radius: 15px; border: 2px solid #222; margin-bottom: 20px; font-family: monospace; }
        
        /* Indicators */
        .bar-container { height: 10px; background: #111; border-radius: 5px; margin: 10px 0; overflow: hidden; border: 1px solid #333; }
        .bar { height: 100%; width: 0%; transition: width 0.1s; }
        #local-bar { background: #007bff; } /* Blue for YOU */
        #remote-bar { background: #0f0; }    /* Green for THEM */

        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 80px; text-align: center; font-size: 1.5rem; border-radius: 10px; margin: 10px; }
        #ptt-btn { 
            width: 130px; height: 130px; border-radius: 50%; border: 10px solid #222; 
            background: #222; color: #555; font-size: 1.2rem; cursor: pointer; outline: none; transition: 0.1s;
        }
        #ptt-btn:active { background: #333; border-color: #0f0; color: #0f0; transform: scale(0.95); }
        #ptt-btn:disabled { opacity: 0.1; }
        #status { font-size: 0.7rem; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="unit">
        <div class="display">
            <div style="font-size: 0.6rem;">MY ID: <span id="my-id" style="font-size: 1.5rem; color: #007bff;">----</span></div>
            <hr style="border: 0; border-top: 1px solid #222;">
            <div style="font-size: 0.6rem;">LOCAL MIC (YOU)</div>
            <div class="bar-container"><div id="local-bar" class="bar"></div></div>
            <div style="font-size: 0.6rem;">REMOTE MIC (THEM)</div>
            <div class="bar-container"><div id="remote-bar" class="bar"></div></div>
            <div id="connection-status" style="font-size: 0.8rem; color: #aaa;">OFFLINE</div>
        </div>
        
        <input type="number" id="remote-id" placeholder="0000">
        <button onclick="connect()" style="background:#0f0; color:#000; border:none; padding:10px 20px; border-radius:10px; font-weight:bold; cursor:pointer;">SYNC</button>
        <br>
        <button id="ptt-btn" disabled>HOLD</button>
        <div id="status">ALLOW MIC ACCESS</div>
    </div>

    <script>
        const id = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('my-id').innerText = id;

        // Force STUN servers to bypass India's mobile network NATs
        const peer = new Peer(id, {
            config: {'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]}
        });

        let localStream;
        const pttBtn = document.getElementById('ptt-btn');
        const localBar = document.getElementById('local-bar');
        const remoteBar = document.getElementById('remote-bar');

        // Setup Local Mic and Visualizer
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            localStream = stream;
            localStream.getAudioTracks()[0].enabled = false; // Start muted
            document.getElementById('status').innerText = "READY";
            setupVisualizer(stream, localBar);
        });

        function connect() {
            const rId = document.getElementById('remote-id').value;
            handleCall(peer.call(rId, localStream));
        }

        peer.on('call', call => {
            call.answer(localStream);
            handleCall(call);
        });

        function handleCall(call) {
            document.getElementById('connection-status').innerText = "CONNECTING...";
            call.on('stream', remoteStream => {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play().catch(() => { document.getElementById('connection-status').innerText = "CLICK TO HEAR!"; });
                setupVisualizer(remoteStream, remoteBar);
                pttBtn.disabled = false;
                document.getElementById('connection-status').innerText = "LIVE";
            });
        }

        function setupVisualizer(stream, barElement) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            source.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            
            function frame() {
                requestAnimationFrame(frame);
                analyser.getByteFrequencyData(data);
                let vol = data.reduce((a, b) => a + b, 0) / data.length;
                barElement.style.width = (vol * 2) + "%";
            }
            frame();
        }

        const startTalk = () => { if(localStream) { localStream.getAudioTracks()[0].enabled = true; pttBtn.style.color = "#0f0"; } };
        const stopTalk = () => { if(localStream) { localStream.getAudioTracks()[0].enabled = false; pttBtn.style.color = "#555"; } };

        pttBtn.addEventListener('mousedown', startTalk);
        pttBtn.addEventListener('mouseup', stopTalk);
        pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startTalk(); });
        pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopTalk(); });
    </script>
</body>
</html>
